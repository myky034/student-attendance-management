name: Keep Supabase Project Alive

on:
  schedule:
    # Chạy vào lúc 00:00 UTC mỗi ngày (khoảng 07:00 giờ Việt Nam)
    - cron: '0 0 * * *'
  # Cho phép kích hoạt thủ công bằng nút bấm trên GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Rest API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
